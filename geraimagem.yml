name: CI/CD Pipeline

on:
  push:
    branches: [ "bl" ]
  pull_request:
    branches: [ "bl" ]

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
    # Instalação do código-fonte
    - name: Checkout repository
      uses: actions/checkout@v4

    # Configuração do Ambiente .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Defina a versão do .NET que está usando (Ex: 8.0, 9.0)

    # Instalação das dependências (Equivalente ao npm ci)
    - name: Restore dependencies
      run: dotnet restore

    - name: Security Audit
      run: dotnet list package --vulnerable

    - name: Build / Code Analysis
      run: dotnet build --configuration Release --no-restore

    
    - name: Run Functional Tests & Coverage
      run: |
        dotnet test --configuration Release --no-build --verbosity normal \
        /p:CollectCoverage=true \
        /p:CoverletOutputFormat=cobertura \
        /p:Threshold=80 \
        /p:ThresholdType=line

  build-and-push:
    runs-on: ubuntu-latest
    needs: qualidade 
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Simulação do Build Docker
      run: echo "Aqui entra o seu passo antigo de gerar e publicar a imagem Docker!"